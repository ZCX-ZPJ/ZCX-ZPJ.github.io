<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>周成鑫 · 3D渲染作品集</title>
    <style>
        :root {
            --bg: #e0e0dc;
            --text: #111;
            --gray: #2c2c2c;
            --accent: #ff8c42;
            --border: rgba(0, 0, 0, 0.06);
            --w: min(1100px, 85vw);
            --offset: clamp(2.5rem, 6vw, 4rem);
            --card-gap: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 300vh;
            overflow-x: hidden;
            cursor: default;
        }

        a,
        .software-item,
        .icon-wrapper,
        .profile-img,
        .hero-title span {
            cursor: pointer !important;
        }

        /* ---------- 第一页 ---------- */
        .page1 {
            position: fixed;
            inset: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: auto;
            z-index: 20;
            will-change: transform, opacity;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: max(1.5rem, 2.5vw) max(2rem, 4vw);
            position: relative;
        }
        .nav-links {
            display: flex;
            gap: clamp(1.8rem, 3vw, 2.8rem);
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            font-weight: 500;
            letter-spacing: -0.01em;
        }
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            transition: transform 0.25s ease;
        }
        .nav-links a:hover {
            transform: scale(1.18);
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(4rem, 8vw, 6.5rem);
            padding: 1rem clamp(1.5rem, 3vw, 2rem) clamp(2rem, 4vw, 3rem);
        }
        .hero-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(1.2rem, 2.5vw, 2.2rem);
            font-size: clamp(4rem, 13vw, 11rem);
            font-weight: 700;
            white-space: nowrap;
            transition: transform 0.15s ease-out;
            will-change: transform;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #0a0a0a;
            margin-top: clamp(-5rem, -6vw, -3rem);
        }
        .hero-title span:first-child {
            font-weight: 750;
        }
        .hero-title span:last-child {
            font-weight: 650;
            color: #202020;
        }
        .dot-text {
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
            font-weight: 650;
        }
        .middle-dot {
            font-size: 1.1em;
            font-weight: 700;
            display: inline-block;
            vertical-align: middle;
            margin: 0 0.05em;
        }
        .profile-img {
            width: clamp(70px, 10vw, 150px);
            border-radius: 8px;
            transform: rotate(-5deg);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }
        .hero-desc {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(3rem, 8vw, 7rem);
            max-width: var(--w);
            width: 100%;
            margin: 0 auto;
            font-size: clamp(1rem, 2vw, 1.3rem);
            line-height: 1.6;
            color: #1e1e1e;
            font-weight: 550;
            letter-spacing: -0.01em;
            padding-top: clamp(1.5rem, 3vw, 2.8rem);
            position: relative;
            overflow: visible;
        }
        .hero-desc::before {
            content: '';
            position: absolute;
            top: 0;
            left: calc(-1 * var(--offset));
            width: calc(100% + 2 * var(--offset));
            height: 1px;
            background: var(--border);
        }
        .hero-desc div:first-child {
            justify-self: start;
            margin-left: calc(-1 * var(--offset));
        }
        .hero-desc div:last-child {
            justify-self: end;
            margin-right: calc(-1 * var(--offset));
            color: var(--gray);
            text-align: left;
            font-weight: 550;
            line-height: 1.6;
        }
        .toolbox-line {
            display: block;
            margin-bottom: 0.2rem;
        }
        .toolbox-line strong {
            font-weight: 650;
        }
        .ai-line {
            display: block;
        }
        .software-item {
            display: inline-block;
            transition: color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }
        .software-item:hover {
            color: var(--accent);
            transform: scale(1.05);
        }
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(1.2rem, 2.5vw, 1.8rem) clamp(1.5rem, 4vw, 3rem);
            width: 100%;
            font-size: clamp(0.7rem, 1vw, 0.8rem);
            font-weight: 450;
            color: #1f1f1f;
            letter-spacing: 0.02em;
            border-top: 1px solid var(--border);
            position: relative;
        }
        .footer-left {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .footer-center {
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .footer-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .icon-wrapper {
            position: relative;
            display: inline-flex;
            cursor: pointer;
        }
        .icon-wrapper svg {
            width: 22px;
            height: 22px;
            fill: #1f1f1f;
            transition: fill 0.2s ease, transform 0.2s ease;
        }
        .icon-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1f1f1f;
            line-height: 1;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .icon-wrapper:hover svg,
        .icon-wrapper:hover .icon-text {
            fill: var(--accent);
            color: var(--accent);
            transform: scale(1.1);
        }
        .icon-wrapper::after {
            content: attr(data-title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: #1f1f1f;
            color: #fff;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
            z-index: 100;
        }
        .icon-wrapper::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-2px);
            border: 5px solid transparent;
            border-top-color: #1f1f1f;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }
        .icon-wrapper:hover::after,
        .icon-wrapper:hover::before {
            opacity: 1;
            visibility: visible;
        }

        /* ---------- 第二页 ---------- */
        .page2 {
            position: fixed;
            inset: 0;
            z-index: 25;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            will-change: opacity;
        }
        .splash-wrapper {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .splash-title {
            font-size: clamp(5rem, 16vw, 14rem);
            font-weight: 750;
            letter-spacing: 0.06em;
            color: #0a0a0a;
            line-height: 1;
            user-select: none;
        }
        .year-tag {
            font-size: clamp(1.1rem, 1.9vw, 1.5rem);
            font-weight: 550;
            letter-spacing: 0.06em;
            color: #3a3a3a;
            user-select: none;
            opacity: 0.85;
            line-height: 1;
            white-space: nowrap;
            margin-left: clamp(0.3rem, 0.8vw, 0.6rem);
            margin-top: 0.35em;
        }
        .year-digits {
            display: inline-block;
        }

        /* ---------- 第三页 ---------- */
        .page3 {
            position: fixed;
            inset: 0;
            z-index: 30;
            background: var(--bg);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.7s cubic-bezier(0.23, 1, 0.32, 1), transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform, opacity;
            padding-bottom: 0;
        }
        .page3.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .gallery-grid {
            display: flex;
            gap: var(--card-gap);
            width: calc(100vw - var(--card-gap) * 2);
            align-items: flex-end;
            justify-content: center;
            padding: var(--card-gap) var(--card-gap) 0;
        }

        .gallery-col {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .col-label {
            font-size: clamp(0.9rem, 1.4vw, 1.1rem);
            font-weight: 550;
            letter-spacing: 0.06em;
            color: #0a0a0a;
            margin-bottom: 0.6rem;
            text-align: center;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .gallery-item {
            flex: 1 1 auto;
            width: 100%;
            min-height: 0;
            aspect-ratio: 9 / 16;
            background: #ccc;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 768px) {
            :root {
                --offset: 0rem;
                --card-gap: 6px;
            }
            header {
                padding: 1rem 1.5rem;
            }
            .nav-links {
                font-size: 1rem;
                gap: 1.5rem;
            }
            main {
                justify-content: space-evenly;
                gap: 0;
                padding: 0.5rem 1.5rem;
            }
            .hero-title {
                white-space: normal;
                flex-wrap: wrap;
                text-align: center;
                font-size: max(2.5rem, 10vw);
                gap: 0.6rem;
                margin: 0;
            }
            .hero-title .dot-text {
                width: 100%;
                text-align: center;
                margin-top: 0.2rem;
            }
            .profile-img {
                width: 65px;
                min-width: 65px;
            }
            .hero-desc {
                display: flex;
                flex-direction: column;
                gap: 0.8rem;
                padding-top: 1rem;
                font-size: max(0.95rem, 3.5vw);
                text-align: center;
            }
            .hero-desc::before {
                left: 0;
                width: 100%;
            }
            .hero-desc div:first-child,
            .hero-desc div:last-child {
                margin: 0;
                width: 100%;
                text-align: center;
            }
            .hero-desc div:last-child {
                gap: 0.3rem;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .software-item:hover {
                transform: none;
                color: inherit;
            }
            .hero-desc .software-item {
                margin: 0 0.12rem;
            }
            footer {
                flex-direction: column;
                gap: 0.5rem;
                padding: 0.8rem 1.5rem;
                font-size: 0.8rem;
                text-align: center;
            }
            .footer-left {
                font-size: 0.85rem;
            }
            .footer-center {
                position: static;
                transform: none;
                font-size: 1rem;
            }
            .footer-right {
                justify-content: center;
                gap: 1.2rem;
            }
            .icon-wrapper svg {
                width: 20px;
                height: 20px;
            }
            .icon-text {
                font-size: 1.2rem;
            }
            .splash-title {
                font-size: max(3.5rem, 14vw);
                letter-spacing: 0.04em;
            }
            .year-tag {
                font-size: max(0.85rem, 3vw);
                margin-left: clamp(0.2rem, 0.8vw, 0.4rem);
                margin-top: 0.25em;
            }
            .gallery-grid {
                width: 100vw;
                padding: 6px 6px 0;
                gap: 6px;
            }
            .col-label {
                font-size: max(0.75rem, 3vw);
                letter-spacing: 0.04em;
                margin-bottom: 0.4rem;
            }
            .gallery-item {
                border-radius: 12px;
            }
            .gallery-item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
        }
    </style>
</head>
<body>
    <div class="page1" id="page1">
        <header>
            <nav class="nav-links">
                <a href="#" id="homeLink">首页</a>
                <a href="#">关于</a>
                <a href="#">工作</a>
            </nav>
        </header>
        <main>
            <div class="hero-title" id="titleMove">
                <span>周成鑫</span><span>—</span>
                <img src="https://raw.githubusercontent.com/ZCX-ZPJ/ZCX-ZPJ.github.io/main/1.png" class="profile-img" alt="头像" onerror="this.src='https://picsum.photos/200/200?random=1'">
                <span class="dot-text">3D<span class="middle-dot">·</span>TYPESPORTFOLIO</span>
            </div>
            <div class="hero-desc">
                <div>Hi, 我是周成鑫，一名数字创意设计师<br>专注将创意策略转化为视觉作品</div>
                <div>
                    <span class="toolbox-line"><strong>日常工具箱：</strong>
                        <span class="software-item blink-1">C4D/Redshift</span>
                        <span class="software-item blink-2">Rhino</span>
                        <span class="software-item blink-3">PS</span>
                        <span class="software-item blink-4">AI</span>
                        <span class="software-item blink-5">AE</span>
                        <span class="software-item blink-6">PR</span>
                        <span class="software-item blink-7">Style3D</span>
                    </span>
                    <span class="ai-line"><span class="software-item blink-8">Ai人工智能工作流</span>（<span class="software-item blink-9">椒图Ai</span> <span class="software-item blink-10">Lovart</span>）</span>
                </div>
            </div>
        </main>
        <footer>
            <div class="footer-left">期待合作</div>
            <div class="footer-center">···</div>
            <div class="footer-right">
                <div class="icon-wrapper" data-title="ZHOU-9-57">
                    <svg viewBox="0 0 24 24"><path d="M8.5 10c-.8 0-1.5.7-1.5 1.5S7.7 13 8.5 13s1.5-.7 1.5-1.5S9.3 10 8.5 10z"/><path d="M15.5 10c-.8 0-1.5.7-1.5 1.5s.7 1.5 1.5 1.5 1.5-.7 1.5-1.5-.7-1.5-1.5-1.5z"/><path d="M21 11.5C21 7.4 17.5 4 13 4c-4.7 0-8.5 3.6-8.5 8 0 2.2 1 4.3 2.5 5.7L6 21l3.5-2.2c1 .4 2.2.7 3.5.7 4.5 0 8-3.4 8-8z"/></svg>
                </div>
                <div class="icon-wrapper" data-title="2077821405"><span class="icon-text">Q</span></div>
                <div class="icon-wrapper" data-title="13226408301">
                    <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1v3c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.2 2.2z"/></svg>
                </div>
            </div>
        </footer>
    </div>

    <div class="page2" id="page2">
        <div class="splash-wrapper">
            <div class="splash-title">作品集</div>
            <div class="year-tag" id="yearTag">©<span class="year-digits" id="yearDigits">2020–2026</span></div>
        </div>
    </div>

    <div class="page3" id="page3">
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <script>
        (() => {
            if ('scrollRestoration' in history) {
                history.scrollRestoration = 'manual';
            }
            window.scrollTo(0, 0);

            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            const page3 = document.getElementById('page3');
            const galleryGrid = document.getElementById('galleryGrid');
            const title = document.getElementById('titleMove');
            const yearDigits = document.getElementById('yearDigits');
            const homeLink = document.getElementById('homeLink');

            if (homeLink) {
                homeLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }

            const captions = ["主图渲染", "详情展示", "AI辅助"];

            for (let i = 0; i < 3; i++) {
                const col = document.createElement('div');
                col.className = 'gallery-col';

                const label = document.createElement('div');
                label.className = 'col-label';
                label.textContent = captions[i];
                col.appendChild(label);

                const item = document.createElement('div');
                item.className = 'gallery-item';
                const img = document.createElement('img');
                img.src = `https://picsum.photos/400/711?random=${i + 50}`;
                img.alt = captions[i];
                item.appendChild(img);
                col.appendChild(item);

                galleryGrid.appendChild(col);
            }

            const FINAL_TEXT = '2020–2026';
            const SPIN_DURATION = 1000;
            const TICK_INTERVAL = 20;
            const LOOP_DELAY = 600;
            const SLOWDOWN_START = 0.5;

            let loopActive = false;
            let intervalId = null;
            let loopTimeout = null;
            let startTime = 0;

            const chars = FINAL_TEXT.split('');
            const totalChars = chars.length;

            function getRandomPool(char) {
                if (char >= '0' && char <= '9') return '0123456789'.split('');
                if (char === '–' || char === '-') return ['–', '—', '·', '-'];
                if (char === '©') return ['©', '®', '℗'];
                return [char];
            }
            const pools = chars.map(ch => getRandomPool(ch));

            let slotPositions = new Array(totalChars).fill(0);
            let locked = new Array(totalChars).fill(false);
            let lockIndex = 0;

            function clearTimers() {
                if (intervalId) clearInterval(intervalId);
                if (loopTimeout) clearTimeout(loopTimeout);
                intervalId = null;
                loopTimeout = null;
            }

            function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

            function updateSlotChars() {
                const elapsed = performance.now() - startTime;
                const globalProgress = Math.min(1, elapsed / SPIN_DURATION);

                const targetLockCount = Math.floor(globalProgress * totalChars);
                while (lockIndex < targetLockCount && lockIndex < totalChars) {
                    const idx = lockIndex;
                    locked[idx] = true;
                    slotPositions[idx] = pools[idx].indexOf(chars[idx]);
                    lockIndex++;
                }

                const result = [];
                for (let i = 0; i < totalChars; i++) {
                    if (locked[i]) { result.push(chars[i]); continue; }
                    const pool = pools[i];
                    if (pool.length <= 1) { result.push(pool[0]); continue; }
                    const slotSlowStart = SLOWDOWN_START + (i / totalChars) * (1 - SLOWDOWN_START) * 0.4;
                    let slotProgress;
                    if (globalProgress >= slotSlowStart) {
                        const slotDuration = 1 - slotSlowStart;
                        slotProgress = Math.min(1, (globalProgress - slotSlowStart) / slotDuration);
                        slotProgress = easeOutCubic(slotProgress);
                    } else { slotProgress = 0; }
                    if (slotProgress < 1) {
                        const speedFactor = 1 + Math.floor((1 - slotProgress) * 12);
                        slotPositions[i] = (slotPositions[i] + speedFactor) % pool.length;
                    } else {
                        locked[i] = true;
                        const finalIdx = pool.indexOf(chars[i]);
                        if (finalIdx >= 0) slotPositions[i] = finalIdx;
                    }
                    result.push(pool[slotPositions[i] % pool.length]);
                }

                yearDigits.textContent = result.join('');

                if (locked.every(v => v)) {
                    yearDigits.textContent = FINAL_TEXT;
                    clearTimers();
                    if (loopActive) {
                        loopTimeout = setTimeout(() => { if (loopActive) startSlotSpin(); }, LOOP_DELAY);
                    }
                }
            }

            function startSlotSpin() {
                clearTimers();
                locked.fill(false);
                lockIndex = 0;
                for (let i = 0; i < totalChars; i++) {
                    slotPositions[i] = Math.floor(Math.random() * pools[i].length);
                }
                startTime = performance.now();
                yearDigits.textContent = FINAL_TEXT;
                intervalId = setInterval(updateSlotChars, TICK_INTERVAL);
            }

            if (title) {
                let tx = 0, cx = 0, raf;
                const updateTitle = () => {
                    cx += (tx - cx) * 0.45;
                    title.style.transform = `translateX(${cx}px)`;
                    if (Math.abs(tx - cx) > 0.5) raf = requestAnimationFrame(updateTitle);
                    else { title.style.transform = `translateX(${tx}px)`; cx = tx; raf = null; }
                };
                document.addEventListener('mousemove', e => {
                    tx = e.clientY < innerHeight / 2 ? (e.clientX / innerWidth - 0.5) * 2000 : 0;
                    if (!raf) raf = requestAnimationFrame(updateTitle);
                });
                document.addEventListener('mouseleave', () => { tx = 0; if (!raf) raf = requestAnimationFrame(updateTitle); });
            }

            let vh = window.innerHeight;
            window.addEventListener('resize', () => { vh = window.innerHeight; });

            let ticking = false;
            let wasPage2Active = false;

            const updateScroll = () => {
                const sY = window.scrollY;

                const p2Start = vh * 0.8;
                const p1Progress = Math.min(1, Math.max(0, sY / p2Start));
                page1.style.transform = `scale(${1 - p1Progress * 0.3})`;
                page1.style.opacity = 1 - p1Progress;
                page1.style.pointerEvents = p1Progress > 0.8 ? 'none' : 'auto';

                const p2End = vh * 1.6;
                const inPage2 = sY >= p2Start && sY < p2End;

                if (inPage2) {
                    page2.style.opacity = 1;
                    page2.style.pointerEvents = 'auto';
                    if (!wasPage2Active) {
                        loopActive = true;
                        startSlotSpin();
                    }
                } else {
                    page2.style.opacity = 0;
                    page2.style.pointerEvents = 'none';
                    if (wasPage2Active) {
                        loopActive = false;
                        clearTimers();
                        yearDigits.textContent = FINAL_TEXT;
                    }
                }
                wasPage2Active = inPage2;

                const p3Start = p2End;
                const inPage3 = sY >= p3Start;
                if (inPage3) { page3.classList.add('active'); } else { page3.classList.remove('active'); }

                ticking = false;
            };

            window.addEventListener('scroll', () => {
                if (!ticking) { requestAnimationFrame(updateScroll); ticking = true; }
            }, { passive: true });
            window.addEventListener('resize', updateScroll);
            updateScroll();
        })();
    </script>
</body>
</html>
