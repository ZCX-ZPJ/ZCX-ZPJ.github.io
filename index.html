<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>周成鑫 · 3D渲染作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
        }

        body {
            background-color: #e0e0dc;
            color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: max(1.5rem, 2.5vw) max(2rem, 4vw);
            width: 100%;
            position: relative;
        }

        .smiley-icon {
            position: absolute;
            left: max(1.5rem, 4vw);
            top: 50%;
            transform: translateY(-50%);
            width: clamp(32px, 5vw, 44px);
            height: clamp(32px, 5vw, 44px);
            cursor: default;
            user-select: none;
            pointer-events: none;
            animation: rotateSmiley 5s linear infinite;
        }

        @keyframes rotateSmiley {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: clamp(1.8rem, 3vw, 2.8rem);
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .nav-links a {
            color: #111;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
            transform-origin: center;
        }

        .nav-links a:hover {
            transform: scale(1.18);
        }

        main {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(4rem, 8vw, 6.5rem);
            padding: 1rem clamp(1.5rem, 3vw, 2rem) clamp(2rem, 4vw, 3rem);
            overflow: visible;
        }

        .hero-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(1.2rem, 2.5vw, 2.2rem);
            font-size: clamp(4rem, 13vw, 11rem);
            font-weight: 700;
            white-space: nowrap;
            transition: transform 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            will-change: transform;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #0a0a0a;
            margin-top: clamp(-5rem, -6vw, -3rem);
        }

        .hero-title .dot-text {
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
            transform: translateY(0);
            font-weight: 650;
            font-size: 1em;
        }

        .dot-text .middle-dot {
            font-size: 1.1em;
            font-weight: 700;
            display: inline-block;
            vertical-align: middle;
            line-height: 1;
            margin: 0 0.05em;
        }

        .profile-img {
            width: clamp(70px, 10vw, 150px);
            height: auto;
            border-radius: 8px;
            transform: rotate(-5deg);
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #ccc;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .hero-desc {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(3rem, 8vw, 7rem);
            max-width: min(1100px, 85vw);
            width: 100%;
            margin: 0 auto;
            font-size: clamp(1rem, 2vw, 1.3rem);
            line-height: 1.6;
            color: #1e1e1e;
            font-weight: 550;
            letter-spacing: -0.01em;
            padding-top: clamp(1.5rem, 3vw, 2.8rem);
            position: relative;
            overflow: visible;
        }

        .hero-desc::before {
            content: '';
            position: absolute;
            top: 0;
            left: clamp(-6rem, -8%, -3rem);
            width: calc(100% - clamp(-12rem, -16%, -6rem) + clamp(-6rem, -8%, -3rem));
            height: 1px;
            background-color: rgba(0,0,0,0.06);
        }

        .hero-desc div:first-child {
            justify-self: start;
            margin-left: clamp(-6rem, -8%, -3rem);
        }

        .hero-desc div:last-child {
            color: #2c2c2c;
            justify-self: end;
            margin-right: clamp(-6rem, -8%, -3rem);
            text-align: left;
            font-weight: 550;
            line-height: 1.6;
            letter-spacing: -0.01em;
        }

        .toolbox-line {
            display: block;
            margin-bottom: 0.2rem;
        }
        .toolbox-line strong {
            font-weight: 650;
        }
        .ai-line {
            display: block;
        }

        .software-item {
            display: inline-block;
            transition: color 0.2s ease, transform 0.2s ease;
            cursor: default;
        }
        .software-item:hover {
            color: #ff8c42;
            transform: scale(1.05);
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(1.2rem, 2.5vw, 1.8rem) clamp(1.5rem, 4vw, 3rem);
            width: 100%;
            font-size: clamp(0.7rem, 1vw, 0.8rem);
            font-weight: 450;
            color: #1f1f1f;
            letter-spacing: 0.02em;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .social-links {
            display: flex;
            gap: clamp(1rem, 2vw, 1.6rem);
        }
        .social-links span {
            cursor: default;
            transition: opacity 0.2s;
            font-weight: 500;
        }
        .social-links span:hover {
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .nav-links {
                font-size: 1.1rem;
                gap: 1.5rem;
            }

            .hero-title {
                white-space: normal;
                flex-wrap: wrap;
                text-align: center;
                justify-content: center;
                font-size: max(2.8rem, 10vw);
                gap: 0.8rem;
                margin-top: -1rem;
            }
            .hero-title .dot-text {
                width: 100%;
                text-align: center;
                margin-top: 0.25rem;
            }

            .hero-desc {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding-top: 1.5rem;
                font-size: max(1rem, 3.8vw);
            }

            .hero-desc::before {
                left: 0;
                width: 100%;
            }

            .hero-desc div:first-child,
            .hero-desc div:last-child {
                margin-left: 0;
                margin-right: 0;
                justify-self: center;
                text-align: center;
                width: 100%;
            }

            .software-item:hover {
                transform: none;
                color: inherit;
            }

            .hero-desc div:last-child .software-item {
                margin: 0 0.15rem;
            }

            .hero-desc div:last-child .software-item {
                animation: none;
            }

            .hero-desc div:last-child .software-item:nth-child(1) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 0s; }
            .hero-desc div:last-child .software-item:nth-child(2) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 4s; }
            .hero-desc div:last-child .software-item:nth-child(3) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 1.5s; }
            .hero-desc div:last-child .software-item:nth-child(4) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 5s; }
            .hero-desc div:last-child .software-item:nth-child(5) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 2.5s; }
            .hero-desc div:last-child .software-item:nth-child(6) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 0.8s; }
            .hero-desc div:last-child .software-item:nth-child(7) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 3.5s; }
            .hero-desc div:last-child .software-item:nth-child(8) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 5.5s; }
            
            .ai-line .software-item:nth-child(1) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 1s; }
            .ai-line .software-item:nth-child(2) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 3s; }
            .ai-line .software-item:nth-child(3) { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 4.5s; }

            @keyframes softOrangeBlink {
                0%, 100% {
                    color: #2c2c2c;
                    transform: scale(1);
                    text-shadow: none;
                }
                15%, 35% {
                    color: #ff9d5c;
                    transform: scale(1.02);
                    text-shadow: 0 0 6px rgba(255,157,92,0.3);
                }
                25% {
                    color: #ff8c42;
                    transform: scale(1.03);
                    text-shadow: 0 0 10px rgba(255,140,66,0.4);
                }
            }

            footer {
                flex-direction: column;
                gap: 0.8rem;
                align-items: center;
                text-align: center;
                padding: 1.5rem;
                font-size: 0.85rem;
            }
            .social-links {
                justify-content: center;
                font-size: 0.9rem;
            }
        }

        .hero-title span:first-child {
            font-weight: 750;
        }
        .hero-title span:last-child {
            font-weight: 650;
            color: #202020;
        }
    </style>
</head>
<body>
    <header>
        <div class="smiley-icon" aria-label="旋转笑脸">
            <svg viewBox="0 0 100 100" width="100%" height="100%" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="50" cy="50" r="42" />
                <circle cx="34" cy="38" r="6" fill="#1a1a1a" stroke="none" />
                <circle cx="66" cy="38" r="6" fill="#1a1a1a" stroke="none" />
                <path d="M32 62 Q50 78, 68 62" stroke="#1a1a1a" fill="none" stroke-width="6" />
            </svg>
        </div>
        <nav class="nav-links">
            <a href="#" aria-current="page">首页</a>
            <a href="#">关于</a>
            <a href="#">工作</a>
        </nav>
    </header>

    <main>
        <div class="hero-title" id="titleMove">
            <span>周成鑫</span>
            <span>—</span>
            <img src="https://raw.githubusercontent.com/ZCX-ZPJ/ZCX-ZPJ.github.io/main/1.png" 
                 class="profile-img" 
                 alt="周成鑫个人作品或头像" 
                 loading="lazy"
                 onerror="this.onerror=null; this.src='https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/020f9000f38c40089922d3d390049311~tplv-a9rns2rl98-image.image';">
            <span class="dot-text">
                3D<span class="middle-dot">·</span>TYPESPORTFOLIO
            </span>
        </div>

        <div class="hero-desc">
            <div>
                Hi, 我是周成鑫，一名数字创意设计师<br>
                专注将创意策略转化为视觉作品
            </div>
            <div>
                <span class="toolbox-line">
                    <strong>日常工具箱：</strong>
                    <span class="software-item">C4D/Redshift</span> 
                    <span class="software-item">Rhino</span> 
                    <span class="software-item">PS</span> 
                    <span class="software-item">AI</span> 
                    <span class="software-item">AE</span> 
                    <span class="software-item">PR</span> 
                    <span class="software-item">Style3D</span>
                </span>
                <span class="ai-line">
                    <span class="software-item">Ai人工智能工作流</span>（<span class="software-item">椒图Ai</span>  <span class="software-item">Lovart</span>）
                </span>
            </div>
        </div>
    </main>

    <footer>
        <div>— CERTIFIED PARTNER</div>
        <div>SHANGHAI — CHINA</div>
        <div class="social-links">
            <span>X</span>
            <span>IG</span>
            <span>Be</span>
            <span>⑧</span>
        </div>
    </footer>

    <script>
        (function() {
            "use strict";
            const titleElement = document.getElementById('titleMove');
            if (!titleElement) return;
            let targetX = 0, currentX = 0, rafId = null;
            function updateTransform() {
                currentX += (targetX - currentX) * 0.25;
                titleElement.style.transform = `translateX(${currentX}px)`;
                if (Math.abs(targetX - currentX) > 0.5) {
                    rafId = requestAnimationFrame(updateTransform);
                } else {
                    titleElement.style.transform = `translateX(${targetX}px)`;
                    currentX = targetX;
                    rafId = null;
                }
            }
            function handleMouseMove(e) {
                const halfHeight = window.innerHeight / 2;
                if (e.clientY < halfHeight) {
                    const mouseX = e.clientX / window.innerWidth;
                    targetX = (mouseX - 0.5) * 1600;
                } else {
                    targetX = 0;
                }
                if (!rafId) rafId = requestAnimationFrame(updateTransform);
            }
            function handleMouseLeave() {
                targetX = 0;
                if (!rafId) rafId = requestAnimationFrame(updateTransform);
            }
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseleave', handleMouseLeave);
        })();
    </script>
</body>
</html>
