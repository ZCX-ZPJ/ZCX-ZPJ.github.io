<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>周成鑫 · 3D渲染作品集</title>
    <style>
        :root {
            --bg: #e0e0dc;
            --text: #111;
            --gray: #2c2c2c;
            --accent: #ff8c42;
            --border: rgba(0, 0, 0, 0.06);
            --w: min(1100px, 85vw);
            --offset: clamp(2.5rem, 6vw, 4rem);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 200vh;
            /* 两屏高度，便于观察滚动过渡 */
            overflow-x: hidden;
        }

        a,
        .software-item,
        .icon-wrapper,
        .profile-img,
        .hero-title span {
            cursor: pointer !important;
        }

        /* ---------- 第一页 (固定) ---------- */
        .page1 {
            position: fixed;
            inset: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: auto;
            z-index: 20;
            will-change: transform, opacity;
            transition: none;
        }

        /* 第一页内部元素沿用之前样式 */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: max(1.5rem, 2.5vw) max(2rem, 4vw);
            position: relative;
        }
        .smiley-icon {
            position: absolute;
            left: max(1.5rem, 4vw);
            top: 50%;
            transform: translateY(-50%);
            width: clamp(32px, 5vw, 44px);
            height: clamp(32px, 5vw, 44px);
            pointer-events: none;
            animation: spin 5s linear infinite;
        }
        @keyframes spin {
            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }
        .nav-links {
            display: flex;
            gap: clamp(1.8rem, 3vw, 2.8rem);
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            font-weight: 500;
            letter-spacing: -0.01em;
        }
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            transition: transform 0.25s ease;
        }
        .nav-links a:hover {
            transform: scale(1.18);
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(4rem, 8vw, 6.5rem);
            padding: 1rem clamp(1.5rem, 3vw, 2rem) clamp(2rem, 4vw, 3rem);
        }
        .hero-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(1.2rem, 2.5vw, 2.2rem);
            font-size: clamp(4rem, 13vw, 11rem);
            font-weight: 700;
            white-space: nowrap;
            transition: transform 0.25s ease;
            will-change: transform;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #0a0a0a;
            margin-top: clamp(-5rem, -6vw, -3rem);
        }
        .hero-title span:first-child {
            font-weight: 750;
        }
        .hero-title span:last-child {
            font-weight: 650;
            color: #202020;
        }
        .dot-text {
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
            font-weight: 650;
        }
        .middle-dot {
            font-size: 1.1em;
            font-weight: 700;
            display: inline-block;
            vertical-align: middle;
            margin: 0 0.05em;
        }
        .profile-img {
            width: clamp(70px, 10vw, 150px);
            border-radius: 8px;
            transform: rotate(-5deg);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }
        .hero-desc {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(3rem, 8vw, 7rem);
            max-width: var(--w);
            width: 100%;
            margin: 0 auto;
            font-size: clamp(1rem, 2vw, 1.3rem);
            line-height: 1.6;
            color: #1e1e1e;
            font-weight: 550;
            letter-spacing: -0.01em;
            padding-top: clamp(1.5rem, 3vw, 2.8rem);
            position: relative;
            overflow: visible;
        }
        .hero-desc::before {
            content: '';
            position: absolute;
            top: 0;
            left: calc(-1 * var(--offset));
            width: calc(100% + 2 * var(--offset));
            height: 1px;
            background: var(--border);
        }
        .hero-desc div:first-child {
            justify-self: start;
            margin-left: calc(-1 * var(--offset));
        }
        .hero-desc div:last-child {
            justify-self: end;
            margin-right: calc(-1 * var(--offset));
            color: var(--gray);
            text-align: left;
            font-weight: 550;
            line-height: 1.6;
        }
        .toolbox-line {
            display: block;
            margin-bottom: 0.2rem;
        }
        .toolbox-line strong {
            font-weight: 650;
        }
        .ai-line {
            display: block;
        }
        .software-item {
            display: inline-block;
            transition: color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }
        .software-item:hover {
            color: var(--accent);
            transform: scale(1.05);
        }
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(1.2rem, 2.5vw, 1.8rem) clamp(1.5rem, 4vw, 3rem);
            width: 100%;
            font-size: clamp(0.7rem, 1vw, 0.8rem);
            font-weight: 450;
            color: #1f1f1f;
            letter-spacing: 0.02em;
            border-top: 1px solid var(--border);
            position: relative;
        }
        .footer-left {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .footer-center {
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .footer-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .icon-wrapper {
            position: relative;
            display: inline-flex;
            cursor: pointer;
        }
        .icon-wrapper svg {
            width: 22px;
            height: 22px;
            fill: #1f1f1f;
            transition: fill 0.2s ease, transform 0.2s ease;
        }
        .icon-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1f1f1f;
            line-height: 1;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .icon-wrapper:hover svg,
        .icon-wrapper:hover .icon-text {
            fill: var(--accent);
            color: var(--accent);
            transform: scale(1.1);
        }
        .icon-wrapper::after {
            content: attr(data-title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: #1f1f1f;
            color: #fff;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
            z-index: 100;
        }
        .icon-wrapper::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-2px);
            border: 5px solid transparent;
            border-top-color: #1f1f1f;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }
        .icon-wrapper:hover::after,
        .icon-wrapper:hover::before {
            opacity: 1;
            visibility: visible;
        }

        /* ---------- 第二页 (固定，初始隐藏) ---------- */
        .page2 {
            position: fixed;
            inset: 0;
            z-index: 25;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform, opacity;
        }
        .page2.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(0.8rem, 1.5vw, 1.6rem);
        }
        .splash-title {
            font-size: clamp(4rem, 14vw, 12rem);
            font-weight: 750;
            letter-spacing: 0.06em;
            color: #0a0a0a;
            line-height: 1;
            text-align: center;
            user-select: none;
        }
        .splash-sub {
            font-size: clamp(0.85rem, 1.4vw, 1.1rem);
            font-weight: 500;
            letter-spacing: 0.25em;
            color: #3a3a3a;
            text-transform: uppercase;
            text-align: center;
            user-select: none;
        }
        .splash-line {
            width: clamp(40px, 8vw, 80px);
            height: 1px;
            background: rgba(0, 0, 0, 0.18);
            border-radius: 1px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            :root {
                --offset: 0rem;
            }
            header {
                padding: 1rem 1.5rem;
            }
            .smiley-icon {
                width: 30px;
                height: 30px;
                min-width: 30px;
                min-height: 30px;
            }
            .nav-links {
                font-size: 1rem;
                gap: 1.5rem;
            }
            main {
                justify-content: space-evenly;
                gap: 0;
                padding: 0.5rem 1.5rem;
            }
            .hero-title {
                white-space: normal;
                flex-wrap: wrap;
                text-align: center;
                font-size: max(2.5rem, 10vw);
                gap: 0.6rem;
                margin: 0;
            }
            .hero-title .dot-text {
                width: 100%;
                text-align: center;
                margin-top: 0.2rem;
            }
            .profile-img {
                width: 65px;
                min-width: 65px;
            }
            .hero-desc {
                display: flex;
                flex-direction: column;
                gap: 0.8rem;
                padding-top: 1rem;
                font-size: max(0.95rem, 3.5vw);
                text-align: center;
            }
            .hero-desc::before {
                left: 0;
                width: 100%;
            }
            .hero-desc div:first-child,
            .hero-desc div:last-child {
                margin: 0;
                width: 100%;
                text-align: center;
            }
            .hero-desc div:last-child {
                gap: 0.3rem;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .software-item:hover {
                transform: none;
                color: inherit;
            }
            .hero-desc .software-item {
                margin: 0 0.12rem;
            }
            .blink-1 { animation: softBlink 6s infinite; animation-delay: 0s; }
            .blink-2 { animation: softBlink 6s infinite; animation-delay: 4s; }
            .blink-3 { animation: softBlink 6s infinite; animation-delay: 1.5s; }
            .blink-4 { animation: softBlink 6s infinite; animation-delay: 5s; }
            .blink-5 { animation: softBlink 6s infinite; animation-delay: 2.5s; }
            .blink-6 { animation: softBlink 6s infinite; animation-delay: 0.8s; }
            .blink-7 { animation: specialBlink 6s infinite; animation-delay: 3.5s; }
            .blink-8 { animation: softBlink 6s infinite; animation-delay: 1s; }
            .blink-9 { animation: softBlink 6s infinite; animation-delay: 3s; }
            .blink-10 { animation: softBlink 6s infinite; animation-delay: 4.5s; }
            @keyframes softBlink {
                0%, 100% { color: var(--gray); transform: scale(1); text-shadow: none; }
                15%, 35% { color: #ff9d5c; transform: scale(1.02); text-shadow: 0 0 6px rgba(255,157,92,0.3); }
                25% { color: var(--accent); transform: scale(1.03); text-shadow: 0 0 10px rgba(255,140,66,0.4); }
            }
            footer {
                flex-direction: column;
                gap: 0.5rem;
                padding: 0.8rem 1.5rem;
                font-size: 0.8rem;
                text-align: center;
            }
            .footer-left { font-size: 0.85rem; }
            .footer-center { position: static; transform: none; font-size: 1rem; }
            .footer-right { justify-content: center; gap: 1.2rem; }
            .icon-wrapper svg { width: 20px; height: 20px; }
            .icon-text { font-size: 1.2rem; }
            .splash-title { font-size: max(3rem, 12vw); letter-spacing: 0.04em; }
            .splash-sub { font-size: max(0.7rem, 2.8vw); letter-spacing: 0.18em; }
            .splash-line { width: max(30px, 6vw); }
        }
    </style>
</head>
<body>
    <!-- 第一页：个人简介 -->
    <div class="page1" id="page1">
        <header>
            <div class="smiley-icon">
                <svg viewBox="0 0 100 100" fill="none" stroke="#1a1a1a" stroke-width="5"><circle cx="50" cy="50" r="42"/><circle cx="34" cy="38" r="6" fill="#1a1a1a" stroke="none"/><circle cx="66" cy="38" r="6" fill="#1a1a1a" stroke="none"/><path d="M32 62 Q50 78, 68 62" stroke="#1a1a1a" fill="none" stroke-width="6"/></svg>
            </div>
            <nav class="nav-links"><a href="#" aria-current="page">首页</a><a href="#">关于</a><a href="#">工作</a></nav>
        </header>
        <main>
            <div class="hero-title" id="titleMove">
                <span>周成鑫</span><span>—</span>
                <img src="https://raw.githubusercontent.com/ZCX-ZPJ/ZCX-ZPJ.github.io/main/1.png" class="profile-img" alt="头像" onerror="this.src='https://picsum.photos/200/200?random=1'">
                <span class="dot-text">3D<span class="middle-dot">·</span>TYPESPORTFOLIO</span>
            </div>
            <div class="hero-desc">
                <div>Hi, 我是周成鑫，一名数字创意设计师<br>专注将创意策略转化为视觉作品</div>
                <div>
                    <span class="toolbox-line"><strong>日常工具箱：</strong>
                        <span class="software-item blink-1">C4D/Redshift</span>
                        <span class="software-item blink-2">Rhino</span>
                        <span class="software-item blink-3">PS</span>
                        <span class="software-item blink-4">AI</span>
                        <span class="software-item blink-5">AE</span>
                        <span class="software-item blink-6">PR</span>
                        <span class="software-item blink-7">Style3D</span>
                    </span>
                    <span class="ai-line"><span class="software-item blink-8">Ai人工智能工作流</span>（<span class="software-item blink-9">椒图Ai</span> <span class="software-item blink-10">Lovart</span>）</span>
                </div>
            </div>
        </main>
        <footer>
            <div class="footer-left">期待合作</div><div class="footer-center">···</div>
            <div class="footer-right">
                <div class="icon-wrapper" data-title="ZHOU-9-57"><svg viewBox="0 0 24 24"><path d="M8.5 10c-.8 0-1.5.7-1.5 1.5S7.7 13 8.5 13s1.5-.7 1.5-1.5S9.3 10 8.5 10z"/><path d="M15.5 10c-.8 0-1.5.7-1.5 1.5s.7 1.5 1.5 1.5 1.5-.7 1.5-1.5-.7-1.5-1.5-1.5z"/><path d="M21 11.5C21 7.4 17.5 4 13 4c-4.7 0-8.5 3.6-8.5 8 0 2.2 1 4.3 2.5 5.7L6 21l3.5-2.2c1 .4 2.2.7 3.5.7 4.5 0 8-3.4 8-8z"/></svg></div>
                <div class="icon-wrapper" data-title="2077821405"><span class="icon-text">Q</span></div>
                <div class="icon-wrapper" data-title="13226408301"><svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1v3c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.2 2.2z"/></svg></div>
            </div>
        </footer>
    </div>

    <!-- 第二页：作品集满屏 -->
    <div class="page2" id="page2">
        <div class="splash-content">
            <div class="splash-line"></div>
            <div class="splash-title">作品集</div>
            <div class="splash-sub">Portfolio</div>
            <div class="splash-line"></div>
        </div>
    </div>

    <script>
        (() => {
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            const title = document.getElementById('titleMove');

            // 标题视差 (第一页内)
            if (title) {
                let tx = 0, cx = 0, raf;
                const updateTitle = () => {
                    cx += (tx - cx) * 0.25;
                    title.style.transform = `translateX(${cx}px)`;
                    if (Math.abs(tx - cx) > 0.5) raf = requestAnimationFrame(updateTitle);
                    else { title.style.transform = `translateX(${tx}px)`; cx = tx; raf = null; }
                };
                document.addEventListener('mousemove', e => {
                    tx = e.clientY < innerHeight / 2 ? (e.clientX / innerWidth - 0.5) * 1600 : 0;
                    if (!raf) raf = requestAnimationFrame(updateTitle);
                });
                document.addEventListener('mouseleave', () => { tx = 0; if (!raf) raf = requestAnimationFrame(updateTitle); });
            }

            let vh = window.innerHeight;
            window.addEventListener('resize', () => { vh = window.innerHeight; });

            let ticking = false;
            const updateScroll = () => {
                const sY = window.scrollY;
                // 第一页：逐渐缩小并淡出 (滚动进度 0 -> 1 视口高度)
                const p1 = Math.min(1, Math.max(0, sY / vh));
                page1.style.transform = `scale(${1 - p1 * 0.3})`;
                page1.style.opacity = 1 - p1;
                page1.style.pointerEvents = p1 > 0.8 ? 'none' : 'auto';

                // 第二页：当滚动超过 0.8 屏时开始出现，使用渐变类控制
                if (sY > vh * 0.8) {
                    page2.classList.add('active');
                } else {
                    page2.classList.remove('active');
                }

                ticking = false;
            };

            window.addEventListener('scroll', () => {
                if (!ticking) {
                    requestAnimationFrame(updateScroll);
                    ticking = true;
                }
            }, { passive: true });
            window.addEventListener('resize', updateScroll);
            updateScroll();
        })();
    </script>
</body>
</html>
