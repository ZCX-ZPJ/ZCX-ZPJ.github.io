<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>周成鑫 · 3D渲染作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e0e0dc;
            color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 顶部导航：导航居中，平面旋转笑脸在左侧 */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2.2rem 3rem 1.5rem;
            width: 100%;
            position: relative;
        }

        /* 纯平面笑脸 — SVG 线条风格 + 持续旋转 */
        .sunflower-icon {
            position: absolute;
            left: 3rem;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            cursor: default;
            user-select: none;
            pointer-events: none;
            animation: flatRotate 5s linear infinite;
        }

        @keyframes flatRotate {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        /* 导航链接 — 居中显示 */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.8rem;
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .nav-links a {
            color: #111;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
            transform-origin: center;
        }

        .nav-links a:hover {
            transform: scale(1.18);
        }

        /* 主内容区 */
        main {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6.5rem;
            padding: 1rem 2rem 3rem;
        }

        .hero-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2.2rem;
            font-size: clamp(4.8rem, 11vw, 8.8rem);
            font-weight: 700;
            white-space: nowrap;
            transition: transform 0.2s linear;
            will-change: transform;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #0a0a0a;
        }

        .penguin-img {
            width: clamp(75px, 7.5vw, 115px);
            height: auto;
            border-radius: 8px;
            transform: rotate(-5deg);
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #ccc;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .hero-desc {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7rem;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            font-size: 1rem;
            line-height: 1.7;
            color: #1e1e1e;
            font-weight: 400;
            letter-spacing: -0.01em;
            border-top: 1px solid rgba(0,0,0,0.06);
            padding-top: 2.8rem;
        }

        .hero-desc div:first-child {
            font-weight: 450;
        }
        .hero-desc div:last-child {
            font-weight: 380;
            color: #2c2c2c;
        }

        /* 底部 */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.8rem 3rem 2.2rem;
            width: 100%;
            font-size: 0.8rem;
            font-weight: 450;
            color: #1f1f1f;
            letter-spacing: 0.02em;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .social-links {
            display: flex;
            gap: 1.6rem;
        }
        .social-links span {
            cursor: default;
            transition: opacity 0.2s;
            font-weight: 500;
        }
        .social-links span:hover {
            opacity: 0.7;
        }

        /* 移动端适配 */
        @media (max-width: 700px) {
            header {
                padding: 1.5rem 1.5rem;
            }
            .sunflower-icon {
                left: 1.5rem;
                width: 36px;
                height: 36px;
            }
            .nav-links {
                gap: 1.8rem;
                font-size: 1.1rem;
            }
            .hero-title {
                gap: 1rem;
                font-size: clamp(3rem, 10vw, 5rem);
                white-space: normal;
                flex-wrap: wrap;
                text-align: center;
            }
            .penguin-img {
                width: 65px;
            }
            .hero-desc {
                grid-template-columns: 1fr;
                gap: 1.8rem;
                padding-top: 1.5rem;
            }
            main {
                gap: 3.5rem;
            }
            footer {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
                padding: 1.5rem 1.8rem;
            }
        }

        .hero-title span:first-child {
            font-weight: 750;
        }
        .hero-title span:last-child {
            font-weight: 650;
            color: #202020;
        }
    </style>
</head>
<body>
    <header>
        <!-- 平面笑脸：内联 SVG 绘制，简洁线条，旋转不停 -->
        <div class="sunflower-icon" aria-label="旋转笑脸">
            <svg viewBox="0 0 100 100" width="100%" height="100%" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="50" cy="50" r="42" />
                <circle cx="34" cy="38" r="6" fill="#1a1a1a" stroke="none" />
                <circle cx="66" cy="38" r="6" fill="#1a1a1a" stroke="none" />
                <path d="M32 62 Q50 78, 68 62" stroke="#1a1a1a" fill="none" stroke-width="6" />
            </svg>
        </div>

        <nav class="nav-links">
            <a href="#" aria-current="page">首页</a>
            <a href="#">关于</a>
            <a href="#">工作</a>
        </nav>
    </header>

    <main>
        <div class="hero-title" id="titleMove">
            <span>周成鑫</span>
            <span>—</span>
            <!-- 
                ====================================================
                🔁 GitHub 仓库图片替换说明 🔁
                ====================================================
                1. 将您的图片上传至 GitHub 仓库（例如 /images 文件夹）。
                2. 在仓库页面点击图片，然后点击 "Download" 按钮。
                3. 右键点击 "Download" 按钮，选择 "复制链接地址"。
                   该地址通常以 "https://raw.githubusercontent.com/" 开头。
                4. 将下面 <img> 标签的 src 属性值替换为您复制的 raw 链接。
                
                示例格式：
                https://raw.githubusercontent.com/用户名/仓库名/分支名/路径/图片.jpg
                
                当前显示的是示例占位图片。
                ====================================================
            -->
            <img src="https://github.com/ZCX-ZPJ/ZCX-ZPJ.github.io/blob/main/1.png?raw=true" 
                 class="penguin-img" 
                 alt="个人头像或作品图" 
                 loading="lazy"
                 onerror="this.src='https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/020f9000f38c40089922d3d390049311~tplv-a9rns2rl98-image.image';this.onerror=null;">
            <!-- 图片替换位置结束 -->
            <span>3D/TYPES</span>
        </div>

        <div class="hero-desc">
            <div>
                Hi, 我是周成鑫，一名数字创意设计师<br>
                专注将创意策略转化为视觉作品
            </div>
            <div>
                Motion Designer, 3D Rendering, Content Creation<br>
                C4D / Redshift 三维渲染视觉设计师
            </div>
        </div>
    </main>

    <footer>
        <div>— CERTIFIED PARTNER</div>
        <div>SHANGHAI — CHINA</div>
        <div class="social-links">
            <span>X</span>
            <span>IG</span>
            <span>Be</span>
            <span>⑧</span>
        </div>
    </footer>

    <script>
        (function() {
            "use strict";

            const titleMove = document.getElementById('titleMove');
            if (titleMove) {
                let targetX = 0;
                let currentX = 0;
                let rafId = null;
                
                const handleMouseMove = (e) => {
                    const mouseX = e.clientX / window.innerWidth;
                    targetX = (mouseX - 0.5) * 600;
                    
                    if (!rafId) {
                        rafId = requestAnimationFrame(updateTransform);
                    }
                };

                const updateTransform = () => {
                    currentX += (targetX - currentX) * 0.35;
                    titleMove.style.transform = `translateX(${currentX}px)`;
                    
                    if (Math.abs(targetX - currentX) > 0.3) {
                        rafId = requestAnimationFrame(updateTransform);
                    } else {
                        titleMove.style.transform = `translateX(${targetX}px)`;
                        currentX = targetX;
                        rafId = null;
                    }
                };

                document.addEventListener('mousemove', handleMouseMove);
                
                document.addEventListener('mouseleave', () => {
                    targetX = 0;
                    if (!rafId) {
                        rafId = requestAnimationFrame(updateTransform);
                    }
                });
            }
        })();
    </script>
</body>
</html>
