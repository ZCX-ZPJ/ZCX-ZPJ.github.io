<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>周成鑫 · 3D渲染作品集</title>
    <style>
        /* ----- 全局重置与变量 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e0e0dc;
            color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ----- 头部导航：居中 + 左侧旋转笑脸 ----- */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2.2rem 3rem 1.5rem;
            width: 100%;
            position: relative;
        }

        /* 平面线条笑脸 — 持续旋转 */
        .smiley-icon {
            position: absolute;
            left: 3rem;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            cursor: default;
            user-select: none;
            pointer-events: none;
            animation: rotateSmiley 5s linear infinite;
        }

        @keyframes rotateSmiley {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        /* 导航链接组 — 完全居中 */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.8rem;
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .nav-links a {
            color: #111;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
            transform-origin: center;
        }

        .nav-links a:hover {
            transform: scale(1.18);
        }

        /* ----- 主内容：垂直居中，标题放大且微调上移 ----- */
        main {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6.5rem;
            padding: 1rem 2rem 3rem;
        }

        /* 大标题区域 — 内部元素均已垂直居中 */
        .hero-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2.2rem;
            font-size: clamp(6rem, 13vw, 11rem);
            font-weight: 700;
            white-space: nowrap;
            transition: transform 0.2s linear;
            will-change: transform;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #0a0a0a;
            margin-top: -4rem;
        }

        /* 右侧文字及中间点的样式 — 垂直居中且点号加粗醒目 */
        .hero-title .dot-text {
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
            transform: translateY(0);
            font-weight: 650;
        }

        /* 特别强调中间点，确保它在视觉上处于正中央 */
        .dot-text .middle-dot {
            font-size: 1.1em;        /* 稍大于周围文字，更醒目 */
            font-weight: 700;
            display: inline-block;
            vertical-align: middle;
            line-height: 1;
            margin: 0 0.05em;         /* 微调左右间距 */
        }

        /* 头像/作品图片 — 同步放大，带轻微旋转 */
        .profile-img {
            width: clamp(100px, 9vw, 150px);
            height: auto;
            border-radius: 8px;
            transform: rotate(-5deg);
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #ccc;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 介绍区域 — 分割线及双栏布局 */
        .hero-desc {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7rem;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            font-size: 1.3rem;
            line-height: 1.6;
            color: #1e1e1e;
            font-weight: 550;
            letter-spacing: -0.01em;
            border-top: 1px solid rgba(0,0,0,0.06);
            padding-top: 2.8rem;
        }

        /* 左栏：向左拉开更多 */
        .hero-desc div:first-child {
            justify-self: start;
            margin-left: -4rem;
        }

        /* 右栏：向右拉开更多 */
        .hero-desc div:last-child {
            color: #2c2c2c;
            justify-self: end;
            margin-right: -4rem;
        }

        /* ----- 底部信息 ----- */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.8rem 3rem 2.2rem;
            width: 100%;
            font-size: 0.8rem;
            font-weight: 450;
            color: #1f1f1f;
            letter-spacing: 0.02em;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .social-links {
            display: flex;
            gap: 1.6rem;
        }
        .social-links span {
            cursor: default;
            transition: opacity 0.2s;
            font-weight: 500;
        }
        .social-links span:hover {
            opacity: 0.7;
        }

        /* ----- 移动端适配 (取消偏移，居中显示) ----- */
        @media (max-width: 700px) {
            header {
                padding: 1.5rem 1.5rem;
            }
            .smiley-icon {
                left: 1.5rem;
                width: 36px;
                height: 36px;
            }
            .nav-links {
                gap: 1.8rem;
                font-size: 1.1rem;
            }
            .hero-title {
                gap: 1rem;
                font-size: clamp(4rem, 12vw, 7rem);
                white-space: normal;
                flex-wrap: wrap;
                text-align: center;
                margin-top: -2rem;
            }
            .profile-img {
                width: 80px;
            }
            .hero-desc {
                grid-template-columns: 1fr;
                gap: 1.8rem;
                padding-top: 1.5rem;
                font-size: 1.1rem;
                font-weight: 550;
            }
            /* 移动端取消左右偏移，居中显示 */
            .hero-desc div:first-child,
            .hero-desc div:last-child {
                margin-left: 0;
                margin-right: 0;
                justify-self: center;
                text-align: center;
            }
            main {
                gap: 3.5rem;
            }
            footer {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
                padding: 1.5rem 1.8rem;
            }
        }

        /* 标题文字粗细微调 */
        .hero-title span:first-child {
            font-weight: 750;
        }
        .hero-title span:last-child {
            font-weight: 650;
            color: #202020;
        }
    </style>
</head>
<body>
    <header>
        <!-- 平面线条笑脸 SVG — 极简风格，无限旋转 -->
        <div class="smiley-icon" aria-label="旋转笑脸">
            <svg viewBox="0 0 100 100" width="100%" height="100%" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="50" cy="50" r="42" />
                <circle cx="34" cy="38" r="6" fill="#1a1a1a" stroke="none" />
                <circle cx="66" cy="38" r="6" fill="#1a1a1a" stroke="none" />
                <path d="M32 62 Q50 78, 68 62" stroke="#1a1a1a" fill="none" stroke-width="6" />
            </svg>
        </div>

        <nav class="nav-links">
            <a href="#" aria-current="page">首页</a>
            <a href="#">关于</a>
            <a href="#">工作</a>
        </nav>
    </header>

    <main>
        <!-- 标题 + 可替换图片 — 中间点已替换为居中的“·”并强化居中 -->
        <div class="hero-title" id="titleMove">
            <span>周成鑫</span>
            <span>—</span>
            <img src="https://https://github.com/ZCX-ZPJ/ZCX-ZPJ.github.io/blob/main/1.png?raw=true" 
                 class="profile-img" 
                 alt="周成鑫个人作品或头像" 
                 loading="lazy"
                 onerror="this.onerror=null; this.src='https://https://github.com/ZCX-ZPJ/ZCX-ZPJ.github.io/blob/main/1.png?raw=true;">
            <span class="dot-text">
                3D<span class="middle-dot">·</span>TYPESPORTFOLIO
            </span>
        </div>

        <!-- 双栏介绍 — 左右拉开，视觉舒展 -->
        <div class="hero-desc">
            <div>
                Hi, 我是周成鑫，一名数字创意设计师<br>
                专注将创意策略转化为视觉作品
            </div>
            <div>
                Motion Designer, 3D Rendering, Content Creation<br>
                C4D / Redshift 三维渲染视觉设计师
            </div>
        </div>
    </main>

    <footer>
        <div>— CERTIFIED PARTNER</div>
        <div>SHANGHAI — CHINA</div>
        <div class="social-links">
            <span>X</span>
            <span>IG</span>
            <span>Be</span>
            <span>⑧</span>
        </div>
    </footer>

    <script>
        (function() {
            "use strict";

            const titleElement = document.getElementById('titleMove');
            if (!titleElement) return;

            let targetX = 0;
            let currentX = 0;
            let rafId = null;
            
            // 平滑更新标题位移
            function updateTransform() {
                currentX += (targetX - currentX) * 0.35;
                titleElement.style.transform = `translateX(${currentX}px)`;
                
                if (Math.abs(targetX - currentX) > 0.3) {
                    rafId = requestAnimationFrame(updateTransform);
                } else {
                    titleElement.style.transform = `translateX(${targetX}px)`;
                    currentX = targetX;
                    rafId = null;
                }
            }

            // 鼠标移动：仅上半屏触发视差，幅度 ±500px
            function handleMouseMove(e) {
                const halfHeight = window.innerHeight / 2;
                if (e.clientY < halfHeight) {
                    const mouseX = e.clientX / window.innerWidth;
                    targetX = (mouseX - 0.5) * 1000;   // -500px ~ 500px
                } else {
                    targetX = 0;
                }
                
                if (!rafId) {
                    rafId = requestAnimationFrame(updateTransform);
                }
            }

            // 鼠标离开窗口时标题归中
            function handleMouseLeave() {
                targetX = 0;
                if (!rafId) {
                    rafId = requestAnimationFrame(updateTransform);
                }
            }

            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseleave', handleMouseLeave);
        })();
    </script>
</body>
</html>
