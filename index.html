<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>周成鑫 · 3D渲染作品集</title>
    <style>
        /* ===== 全局变量 ===== */
        :root {
            --bg-color: #e0e0dc;
            --text-dark: #111;
            --text-gray: #2c2c2c;
            --accent-orange: #ff8c42;
            --border-light: rgba(0,0,0,0.06);
            --container-width: min(1100px, 85vw);
        }

        /* ===== 基础重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== 头部导航 ===== */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: max(1.5rem, 2.5vw) max(2rem, 4vw);
            width: 100%;
            position: relative;
        }

        .smiley-icon {
            position: absolute;
            left: max(1.5rem, 4vw);
            top: 50%;
            transform: translateY(-50%);
            width: clamp(32px, 5vw, 44px);
            height: clamp(32px, 5vw, 44px);
            pointer-events: none;
            animation: rotateSmiley 5s linear infinite;
        }

        @keyframes rotateSmiley {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: clamp(1.8rem, 3vw, 2.8rem);
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        .nav-links a:hover { transform: scale(1.18); }

        /* ===== 主内容区 ===== */
        main {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(4rem, 8vw, 6.5rem);
            padding: 1rem clamp(1.5rem, 3vw, 2rem) clamp(2rem, 4vw, 3rem);
        }

        /* 标题区 */
        .hero-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(1.2rem, 2.5vw, 2.2rem);
            font-size: clamp(4rem, 13vw, 11rem);
            font-weight: 700;
            white-space: nowrap;
            transition: transform 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            will-change: transform;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #0a0a0a;
            margin-top: clamp(-5rem, -6vw, -3rem);
        }

        .hero-title span:first-child { font-weight: 750; }
        .hero-title span:last-child { font-weight: 650; color: #202020; }

        .dot-text {
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
            font-weight: 650;
        }

        .middle-dot {
            font-size: 1.1em;
            font-weight: 700;
            display: inline-block;
            vertical-align: middle;
            line-height: 1;
            margin: 0 0.05em;
        }

        .profile-img {
            width: clamp(70px, 10vw, 150px);
            height: auto;
            border-radius: 8px;
            transform: rotate(-5deg);
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #ccc;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 介绍区 — 分割线精确对齐 */
        .hero-desc {
            --offset: clamp(2.5rem, 6vw, 4rem);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(3rem, 8vw, 7rem);
            max-width: var(--container-width);
            width: 100%;
            margin: 0 auto;
            font-size: clamp(1rem, 2vw, 1.3rem);
            line-height: 1.6;
            color: #1e1e1e;
            font-weight: 550;
            letter-spacing: -0.01em;
            padding-top: clamp(1.5rem, 3vw, 2.8rem);
            position: relative;
            overflow: visible;
        }

        /* 主分割线 — 覆盖容器宽度 */
        .hero-desc::before {
            content: '';
            position: absolute;
            top: 0;
            left: calc(-1 * var(--offset));
            width: calc(100% + 2 * var(--offset));
            height: 1px;
            background-color: var(--border-light);
        }

        /* 左栏 — 向左延伸 */
        .hero-desc div:first-child {
            justify-self: start;
            margin-left: calc(-1 * var(--offset));
        }

        /* 右栏 — 向右延伸，PC端左对齐 */
        .hero-desc div:last-child {
            color: var(--text-gray);
            justify-self: end;
            margin-right: calc(-1 * var(--offset));
            text-align: left;
            font-weight: 550;
            line-height: 1.6;
        }

        .toolbox-line {
            display: block;
            margin-bottom: 0.2rem;
        }
        .toolbox-line strong { font-weight: 650; }
        .ai-line { display: block; }

        /* 软件项悬停效果 */
        .software-item {
            display: inline-block;
            transition: color 0.2s ease, transform 0.2s ease;
            cursor: default;
        }
        .software-item:hover {
            color: var(--accent-orange);
            transform: scale(1.05);
        }

        /* ===== 底部信息 ===== */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(1.2rem, 2.5vw, 1.8rem) clamp(1.5rem, 4vw, 3rem);
            width: 100%;
            font-size: clamp(0.7rem, 1vw, 0.8rem);
            font-weight: 450;
            color: #1f1f1f;
            letter-spacing: 0.02em;
            border-top: 1px solid var(--border-light);
        }

        .footer-left {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .footer-center {
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
            font-weight: 400;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .footer-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .icon-wrapper {
            position: relative;
            display: inline-flex;
            cursor: default;
        }

        .icon-wrapper svg {
            width: 22px;
            height: 22px;
            fill: #1f1f1f;
            transition: fill 0.2s ease, transform 0.2s ease;
        }

        .icon-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1f1f1f;
            transition: color 0.2s ease, transform 0.2s ease;
            line-height: 1;
        }

        .icon-wrapper:hover .icon-text {
            color: var(--accent-orange);
            transform: scale(1.1);
        }

        .icon-wrapper:hover svg {
            fill: var(--accent-orange);
            transform: scale(1.1);
        }

        /* 自定义悬停提示 */
        .icon-wrapper::after {
            content: attr(data-title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: #1f1f1f;
            color: #fff;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            pointer-events: none;
            z-index: 100;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .icon-wrapper::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-2px);
            border: 5px solid transparent;
            border-top-color: #1f1f1f;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            pointer-events: none;
            z-index: 100;
        }

        .icon-wrapper:hover::after,
        .icon-wrapper:hover::before {
            opacity: 1;
            visibility: visible;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            header {
                padding: 0.8rem 1.5rem;
            }

            .smiley-icon {
                width: 30px;
                height: 30px;
                min-width: 30px;
                min-height: 30px;
            }

            .nav-links { 
                font-size: 1rem; 
                gap: 1.2rem; 
            }

            main {
                justify-content: flex-start;
                gap: 1rem;
                padding: 0.5rem 1.5rem 1rem;
            }

            .hero-title {
                white-space: normal;
                flex-wrap: wrap;
                text-align: center;
                justify-content: center;
                font-size: max(2.5rem, 10vw);
                gap: 0.6rem;
                margin-top: 0;
            }
            .hero-title .dot-text {
                width: 100%;
                text-align: center;
                margin-top: 0.2rem;
            }

            .profile-img {
                width: 60px;
                min-width: 60px;
            }

            .hero-desc {
                --offset: 0rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
                padding-top: 1rem;
                font-size: max(0.95rem, 3.5vw);
                text-align: center;
            }

            .hero-desc::before { left: 0; width: 100%; }

            .hero-desc div:first-child,
            .hero-desc div:last-child {
                margin-left: 0;
                margin-right: 0;
                width: 100%;
                text-align: center;
            }

            .hero-desc div:last-child {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.3rem;
            }

            .toolbox-line {
                margin-bottom: 0.1rem;
            }

            .software-item:hover { transform: none; color: inherit; }
            .hero-desc div:last-child .software-item { margin: 0 0.12rem; }

            /* 移动端闪烁动画 */
            .blink-1 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 0s; }
            .blink-2 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 4s; }
            .blink-3 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 1.5s; }
            .blink-4 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 5s; }
            .blink-5 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 2.5s; }
            .blink-6 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 0.8s; }
            .blink-7 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 3.5s; }
            .blink-8 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 1s; }
            .blink-9 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 3s; }
            .blink-10 { animation: softOrangeBlink 6s ease-in-out infinite; animation-delay: 4.5s; }

            @keyframes softOrangeBlink {
                0%, 100% { color: var(--text-gray); transform: scale(1); text-shadow: none; }
                15%, 35% { color: #ff9d5c; transform: scale(1.02); text-shadow: 0 0 6px rgba(255,157,92,0.3); }
                25% { color: var(--accent-orange); transform: scale(1.03); text-shadow: 0 0 10px rgba(255,140,66,0.4); }
            }

            footer {
                flex-direction: column;
                gap: 0.5rem;
                align-items: center;
                text-align: center;
                padding: 0.8rem 1.5rem;
                font-size: 0.8rem;
                position: relative;
            }
            .footer-left { font-size: 0.85rem; }
            .footer-center {
                position: static;
                transform: none;
                font-size: 1rem;
            }
            .footer-right { 
                justify-content: center;
                gap: 1.2rem;
            }
            .icon-wrapper svg {
                width: 20px;
                height: 20px;
            }
            .icon-text {
                font-size: 1.2rem;
            }
            .icon-wrapper::after { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="smiley-icon" aria-label="旋转笑脸">
            <svg viewBox="0 0 100 100" width="100%" height="100%" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="50" cy="50" r="42" />
                <circle cx="34" cy="38" r="6" fill="#1a1a1a" stroke="none" />
                <circle cx="66" cy="38" r="6" fill="#1a1a1a" stroke="none" />
                <path d="M32 62 Q50 78, 68 62" stroke="#1a1a1a" fill="none" stroke-width="6" />
            </svg>
        </div>
        <nav class="nav-links">
            <a href="#" aria-current="page">首页</a>
            <a href="#">关于</a>
            <a href="#">工作</a>
        </nav>
    </header>

    <main>
        <div class="hero-title" id="titleMove">
            <span>周成鑫</span>
            <span>—</span>
            <img src="https://raw.githubusercontent.com/ZCX-ZPJ/ZCX-ZPJ.github.io/main/1.png" 
                 class="profile-img" 
                 alt="周成鑫个人作品或头像" 
                 loading="lazy"
                 onerror="this.onerror=null; this.src='https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/020f9000f38c40089922d3d390049311~tplv-a9rns2rl98-image.image';">
            <span class="dot-text">
                3D<span class="middle-dot">·</span>TYPESPORTFOLIO
            </span>
        </div>

        <div class="hero-desc">
            <div>
                Hi, 我是周成鑫，一名数字创意设计师<br>
                专注将创意策略转化为视觉作品
            </div>
            <div>
                <span class="toolbox-line">
                    <strong>日常工具箱：</strong>
                    <span class="software-item blink-1">C4D/Redshift</span> 
                    <span class="software-item blink-2">Rhino</span> 
                    <span class="software-item blink-3">PS</span> 
                    <span class="software-item blink-4">AI</span> 
                    <span class="software-item blink-5">AE</span> 
                    <span class="software-item blink-6">PR</span> 
                    <span class="software-item blink-7">Style3D</span>
                </span>
                <span class="ai-line">
                    <span class="software-item blink-8">Ai人工智能工作流</span>（<span class="software-item blink-9">椒图Ai</span>  <span class="software-item blink-10">Lovart</span>）
                </span>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-left">期待合作</div>
        <div class="footer-center">···</div>
        <div class="footer-right">
            <div class="icon-wrapper" data-title="ZHOU-9-57">
                <svg viewBox="0 0 24 24" width="22" height="22">
                    <path d="M8.5 10c-.8 0-1.5.7-1.5 1.5S7.7 13 8.5 13s1.5-.7 1.5-1.5S9.3 10 8.5 10z"/>
                    <path d="M15.5 10c-.8 0-1.5.7-1.5 1.5s.7 1.5 1.5 1.5 1.5-.7 1.5-1.5-.7-1.5-1.5-1.5z"/>
                    <path d="M21 11.5C21 7.4 17.5 4 13 4c-4.7 0-8.5 3.6-8.5 8 0 2.2 1 4.3 2.5 5.7L6 21l3.5-2.2c1 .4 2.2.7 3.5.7 4.5 0 8-3.4 8-8z"/>
                </svg>
            </div>
            <div class="icon-wrapper" data-title="2077821405">
                <span class="icon-text">Q</span>
            </div>
            <div class="icon-wrapper" data-title="13226408301">
                <svg viewBox="0 0 24 24" width="22" height="22">
                    <path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1v3c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.2 2.2z"/>
                </svg>
            </div>
        </div>
    </footer>

    <script>
        (function() {
            "use strict";
            const titleElement = document.getElementById('titleMove');
            if (!titleElement) return;
            let targetX = 0, currentX = 0, rafId = null;
            
            function updateTransform() {
                currentX += (targetX - currentX) * 0.25;
                titleElement.style.transform = `translateX(${currentX}px)`;
                if (Math.abs(targetX - currentX) > 0.5) {
                    rafId = requestAnimationFrame(updateTransform);
                } else {
                    titleElement.style.transform = `translateX(${targetX}px)`;
                    currentX = targetX;
                    rafId = null;
                }
            }
            
            function handleMouseMove(e) {
                const halfHeight = window.innerHeight / 2;
                if (e.clientY < halfHeight) {
                    targetX = (e.clientX / window.innerWidth - 0.5) * 1600;
                } else {
                    targetX = 0;
                }
                if (!rafId) rafId = requestAnimationFrame(updateTransform);
            }
            
            function handleMouseLeave() {
                targetX = 0;
                if (!rafId) rafId = requestAnimationFrame(updateTransform);
            }
            
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseleave', handleMouseLeave);
        })();
    </script>
</body>
</html>
