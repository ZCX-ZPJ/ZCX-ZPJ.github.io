<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>周成鑫 · 3D渲染作品集</title>
    <style>
        /* ===== 全局变量 ===== */
        :root {
            --bg-color: #e0e0dc;
            --text-dark: #111;
            --text-gray: #2c2c2c;
            --accent-orange: #ff8c42;
            --border-light: rgba(0,0,0,0.06);
            --container-width: min(1100px, 85vw);
            --offset: clamp(2.5rem, 6vw, 4rem);
        }

        /* ===== 基础重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100vw;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== 页面容器 ===== */
        .pages-container {
            position: relative;
            width: 100%;
        }

        .page {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* 第二页特殊布局 */
        #page2 {
            position: relative;
            overflow: hidden;
        }

        .page2-hero {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .hero-image-container {
            width: min(800px, 90vw);
            height: min(600px, 70vh);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15);
            transition: all 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-origin: center center;
        }

        .hero-image-container.zoomed {
            transform: scale(0.35);
            opacity: 0;
            pointer-events: none;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #ccc;
        }

        .hero-title-text {
            margin-top: 2rem;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 650;
            letter-spacing: -0.02em;
            transition: opacity 0.4s ease;
        }

        /* 九宫格作品集 */
        .gallery-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1), visibility 0.6s;
            padding: 2rem;
        }

        .gallery-section.visible {
            opacity: 1;
            visibility: visible;
        }

        .gallery-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 650;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        .gallery-item {
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #ccc;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 第二页头部和底部 */
        #page2 header,
        #page2 footer {
            position: relative;
            z-index: 10;
            background-color: var(--bg-color);
        }

        /* ===== 头部导航 ===== */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: max(1.5rem, 2.5vw) max(2rem, 4vw);
            width: 100%;
            position: relative;
        }

        .smiley-icon {
            position: absolute;
            left: max(1.5rem, 4vw);
            top: 50%;
            transform: translateY(-50%);
            width: clamp(32px, 5vw, 44px);
            height: clamp(32px, 5vw, 44px);
            pointer-events: none;
            animation: rotate 5s linear infinite;
        }

        @keyframes rotate {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: clamp(1.8rem, 3vw, 2.8rem);
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        .nav-links a:hover { transform: scale(1.18); }

        /* ===== 主内容区 ===== */
        main {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(4rem, 8vw, 6.5rem);
            padding: 1rem clamp(1.5rem, 3vw, 2rem) clamp(2rem, 4vw, 3rem);
        }

        /* 标题区 */
        .hero-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(1.2rem, 2.5vw, 2.2rem);
            font-size: clamp(4rem, 13vw, 11rem);
            font-weight: 700;
            white-space: nowrap;
            transition: transform 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            will-change: transform;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #0a0a0a;
            margin-top: clamp(-5rem, -6vw, -3rem);
        }

        .hero-title span:first-child { font-weight: 750; }
        .hero-title span:last-child { font-weight: 650; color: #202020; }

        .dot-text {
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
            font-weight: 650;
        }

        .middle-dot {
            font-size: 1.1em;
            font-weight: 700;
            display: inline-block;
            vertical-align: middle;
            line-height: 1;
            margin: 0 0.05em;
        }

        .profile-img {
            width: clamp(70px, 10vw, 150px);
            height: auto;
            border-radius: 8px;
            transform: rotate(-5deg);
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #ccc;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 介绍区 */
        .hero-desc {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(3rem, 8vw, 7rem);
            max-width: var(--container-width);
            width: 100%;
            margin: 0 auto;
            font-size: clamp(1rem, 2vw, 1.3rem);
            line-height: 1.6;
            color: #1e1e1e;
            font-weight: 550;
            letter-spacing: -0.01em;
            padding-top: clamp(1.5rem, 3vw, 2.8rem);
            position: relative;
            overflow: visible;
        }

        .hero-desc::before {
            content: '';
            position: absolute;
            top: 0;
            left: calc(-1 * var(--offset));
            width: calc(100% + 2 * var(--offset));
            height: 1px;
            background-color: var(--border-light);
        }

        .hero-desc div:first-child {
            justify-self: start;
            margin-left: calc(-1 * var(--offset));
        }

        .hero-desc div:last-child {
            color: var(--text-gray);
            justify-self: end;
            margin-right: calc(-1 * var(--offset));
            text-align: left;
            font-weight: 550;
            line-height: 1.6;
        }

        .toolbox-line {
            display: block;
            margin-bottom: 0.2rem;
        }
        .toolbox-line strong { font-weight: 650; }
        .ai-line { display: block; }

        .software-item {
            display: inline-block;
            transition: color 0.2s ease, transform 0.2s ease;
            cursor: default;
        }
        .software-item:hover {
            color: var(--accent-orange);
            transform: scale(1.05);
        }

        /* ===== 底部信息 ===== */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(1.2rem, 2.5vw, 1.8rem) clamp(1.5rem, 4vw, 3rem);
            width: 100%;
            font-size: clamp(0.7rem, 1vw, 0.8rem);
            font-weight: 450;
            color: #1f1f1f;
            letter-spacing: 0.02em;
            border-top: 1px solid var(--border-light);
            position: relative;
        }

        .footer-left { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.05em; }
        .footer-center { font-size: 1.2rem; letter-spacing: 0.3rem; font-weight: 400; position: absolute; left: 50%; transform: translateX(-50%); }
        .footer-right { display: flex; gap: 1.5rem; align-items: center; }

        .icon-wrapper {
            position: relative;
            display: inline-flex;
            cursor: default;
        }

        .icon-wrapper svg {
            width: 22px;
            height: 22px;
            fill: #1f1f1f;
            transition: fill 0.2s ease, transform 0.2s ease;
        }

        .icon-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1f1f1f;
            transition: color 0.2s ease, transform 0.2s ease;
            line-height: 1;
        }

        .icon-wrapper:hover .icon-text,
        .icon-wrapper:hover svg {
            color: var(--accent-orange);
            fill: var(--accent-orange);
            transform: scale(1.1);
        }

        /* 悬停提示 */
        .icon-wrapper::after {
            content: attr(data-title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: #1f1f1f;
            color: #fff;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            pointer-events: none;
            z-index: 100;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .icon-wrapper::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-2px);
            border: 5px solid transparent;
            border-top-color: #1f1f1f;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            pointer-events: none;
            z-index: 100;
        }

        .icon-wrapper:hover::after,
        .icon-wrapper:hover::before {
            opacity: 1;
            visibility: visible;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            :root { --offset: 0rem; }

            header { padding: 1rem 1.5rem; }
            .smiley-icon { width: 30px; height: 30px; min-width: 30px; min-height: 30px; }
            .nav-links { font-size: 1rem; gap: 1.5rem; }

            main {
                justify-content: space-evenly;
                gap: 0;
                padding: 0.5rem 1.5rem;
            }

            .hero-title {
                white-space: normal;
                flex-wrap: wrap;
                text-align: center;
                justify-content: center;
                font-size: max(2.5rem, 10vw);
                gap: 0.6rem;
                margin: 0;
            }
            .hero-title .dot-text { width: 100%; text-align: center; margin-top: 0.2rem; }
            .profile-img { width: 65px; min-width: 65px; }

            .hero-desc {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
                padding-top: 1rem;
                font-size: max(0.95rem, 3.5vw);
                text-align: center;
                margin: 0;
            }

            .hero-desc::before { left: 0; width: 100%; }
            .hero-desc div:first-child,
            .hero-desc div:last-child { margin: 0; width: 100%; text-align: center; }
            .hero-desc div:last-child { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
            .toolbox-line { margin-bottom: 0.1rem; }
            .software-item:hover { transform: none; color: inherit; }
            .hero-desc div:last-child .software-item { margin: 0 0.12rem; }

            /* 闪烁动画 */
            .blink-1 { animation: softBlink 6s ease-in-out infinite; animation-delay: 0s; }
            .blink-2 { animation: softBlink 6s ease-in-out infinite; animation-delay: 4s; }
            .blink-3 { animation: softBlink 6s ease-in-out infinite; animation-delay: 1.5s; }
            .blink-4 { animation: softBlink 6s ease-in-out infinite; animation-delay: 5s; }
            .blink-5 { animation: softBlink 6s ease-in-out infinite; animation-delay: 2.5s; }
            .blink-6 { animation: softBlink 6s ease-in-out infinite; animation-delay: 0.8s; }
            .blink-7 { animation: softBlink 6s ease-in-out infinite; animation-delay: 3.5s; }
            .blink-8 { animation: softBlink 6s ease-in-out infinite; animation-delay: 1s; }
            .blink-9 { animation: softBlink 6s ease-in-out infinite; animation-delay: 3s; }
            .blink-10 { animation: softBlink 6s ease-in-out infinite; animation-delay: 4.5s; }

            @keyframes softBlink {
                0%, 100% { color: var(--text-gray); transform: scale(1); text-shadow: none; }
                15%, 35% { color: #ff9d5c; transform: scale(1.02); text-shadow: 0 0 6px rgba(255,157,92,0.3); }
                25% { color: var(--accent-orange); transform: scale(1.03); text-shadow: 0 0 10px rgba(255,140,66,0.4); }
            }

            footer {
                flex-direction: column;
                gap: 0.5rem;
                align-items: center;
                text-align: center;
                padding: 0.8rem 1.5rem;
                font-size: 0.8rem;
            }
            .footer-left { font-size: 0.85rem; }
            .footer-center { position: static; transform: none; font-size: 1rem; }
            .footer-right { justify-content: center; gap: 1.2rem; }
            .icon-wrapper svg { width: 20px; height: 20px; }
            .icon-text { font-size: 1.2rem; }
            .icon-wrapper::after { font-size: 0.6rem; }

            .gallery-grid { gap: 0.8rem; }
            .hero-image-container { height: min(400px, 50vh); }
            .hero-image-container.zoomed { transform: scale(0.5); }
        }
    </style>
</head>

    <script>
        (function() {
            "use strict";
            
            // 第一页标题视差效果
            const title = document.getElementById('titleMove');
            if (title) {
                let targetX = 0, currentX = 0, raf = null;
                
                function update() {
                    currentX += (targetX - currentX) * 0.25;
                    title.style.transform = `translateX(${currentX}px)`;
                    if (Math.abs(targetX - currentX) > 0.5) {
                        raf = requestAnimationFrame(update);
                    } else {
                        title.style.transform = `translateX(${targetX}px)`;
                        currentX = targetX;
                        raf = null;
                    }
                }
                
                function move(e) {
                    if (e.clientY < window.innerHeight / 2) {
                        targetX = (e.clientX / window.innerWidth - 0.5) * 1600;
                    } else {
                        targetX = 0;
                    }
                    if (!raf) raf = requestAnimationFrame(update);
                }
                
                function leave() {
                    targetX = 0;
                    if (!raf) raf = requestAnimationFrame(update);
                }
                
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseleave', leave);
            }

            // 页面切换与缩放效果
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            const heroContainer = document.getElementById('heroImageContainer');
            const page2Hero = document.getElementById('page2Hero');
            const gallerySection = document.getElementById('gallerySection');
            
            let currentPage = 1;
            let isTransitioning = false;
            let scrollProgress = 0;
            
            // 监听第二页内部的滚动
            page2.addEventListener('wheel', (e) => {
                if (currentPage !== 2) return;
                e.preventDefault();
                
                const delta = e.deltaY;
                scrollProgress = Math.min(1, Math.max(0, scrollProgress + delta * 0.002));
                
                if (scrollProgress > 0.3 && !isTransitioning) {
                    // 触发缩放并显示九宫格
                    heroContainer.classList.add('zoomed');
                    setTimeout(() => {
                        page2Hero.style.opacity = '0';
                        gallerySection.classList.add('visible');
                        setTimeout(() => {
                            page2Hero.style.display = 'none';
                        }, 600);
                    }, 400);
                    isTransitioning = true;
                }
            }, { passive: false });
            
            // 全局页面切换
            let globalScrollLock = false;
            
            window.addEventListener('wheel', (e) => {
                if (globalScrollLock) return;
                
                const delta = e.deltaY;
                
                if (delta > 0 && currentPage === 1) {
                    e.preventDefault();
                    globalScrollLock = true;
                    currentPage = 2;
                    
                    page1.style.opacity = '0';
                    page2.style.opacity = '1';
                    
                    setTimeout(() => {
                        page2.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        globalScrollLock = false;
                        scrollProgress = 0;
                        heroContainer.classList.remove('zoomed');
                        page2Hero.style.opacity = '1';
                        page2Hero.style.display = 'flex';
                        gallerySection.classList.remove('visible');
                        isTransitioning = false;
                    }, 600);
                } else if (delta < 0 && currentPage === 2 && scrollProgress === 0) {
                    e.preventDefault();
                    globalScrollLock = true;
                    currentPage = 1;
                    
                    page2.style.opacity = '0';
                    page1.style.opacity = '1';
                    
                    setTimeout(() => {
                        page1.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        globalScrollLock = false;
                    }, 600);
                }
            }, { passive: false });
            
            // 触摸滑动支持
            let touchStartY = 0;
            
            window.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            });
            
            window.addEventListener('touchmove', (e) => {
                if (globalScrollLock) return;
                const touchY = e.touches[0].clientY;
                const diff = touchStartY - touchY;
                
                if (Math.abs(diff) > 50) {
                    if (diff > 0 && currentPage === 1) {
                        globalScrollLock = true;
                        currentPage = 2;
                        page1.style.opacity = '0';
                        page2.style.opacity = '1';
                        setTimeout(() => {
                            page2.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            globalScrollLock = false;
                            scrollProgress = 0;
                            heroContainer.classList.remove('zoomed');
                            page2Hero.style.opacity = '1';
                            page2Hero.style.display = 'flex';
                            gallerySection.classList.remove('visible');
                            isTransitioning = false;
                        }, 600);
                    } else if (diff < 0 && currentPage === 2 && scrollProgress === 0) {
                        globalScrollLock = true;
                        currentPage = 1;
                        page2.style.opacity = '0';
                        page1.style.opacity = '1';
                        setTimeout(() => {
                            page1.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            globalScrollLock = false;
                        }, 600);
                    }
                }
            }, { passive: true });
        })();
    </script>
